spring.application.name=load-test

server.port=${PORT:8080}

# PostgreSQL - Heroku sets JDBC_DATABASE_* automatically
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/loadtest}
spring.datasource.username=${JDBC_DATABASE_USERNAME:postgres}
spring.datasource.password=${JDBC_DATABASE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}

# HikariCP - match thread count
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL:4}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:1}
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=-1

# MySQL (secondary database)
app.datasource.mysql.enabled=${MYSQL_ENABLED:false}
app.datasource.mysql.url=${MYSQL_URL:}
app.datasource.mysql.username=${MYSQL_USERNAME:}
app.datasource.mysql.password=${MYSQL_PASSWORD:}
app.datasource.mysql.hikari.maximum-pool-size=${MYSQL_HIKARI_MAX_POOL:4}
app.datasource.mysql.hikari.minimum-idle=${MYSQL_HIKARI_MIN_IDLE:1}
app.datasource.mysql.hikari.connection-timeout=30000
app.datasource.mysql.hikari.initialization-fail-timeout=-1

# Load Test Config
loadtest.threads=${LOADTEST_THREADS:100}
loadtest.chunk-size-mb=${LOADTEST_CHUNK_MB:10}
loadtest.video-path=${LOADTEST_VIDEO_PATH:./data/video.mp4}
loadtest.hashing-rounds=${LOADTEST_HASH_ROUNDS:5}
loadtest.matrix-size=${LOADTEST_MATRIX_SIZE:200}
loadtest.memory-pressure-mb=${LOADTEST_MEMORY_MB:500}
loadtest.auto-start=${LOADTEST_AUTO_START:false}
loadtest.generate-if-missing=${LOADTEST_GENERATE:false}
loadtest.generate-size-mb=${LOADTEST_GENERATE_SIZE_MB:100}
