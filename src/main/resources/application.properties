spring.application.name=load-test

server.port=${PORT:8080}

# PostgreSQL (custom prefix to avoid Heroku buildpack override)
app.datasource.pg.url=${PG_URL:jdbc:postgresql://localhost:5432/loadtest}
app.datasource.pg.username=${PG_USERNAME:postgres}
app.datasource.pg.password=${PG_PASSWORD:postgres}
app.datasource.pg.hikari.maximum-pool-size=${HIKARI_MAX_POOL:4}
app.datasource.pg.hikari.minimum-idle=${HIKARI_MIN_IDLE:1}
app.datasource.pg.hikari.connection-timeout=30000
app.datasource.pg.hikari.initialization-fail-timeout=-1
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}

# PostgreSQL 2 (stopped â€” stats only)
app.datasource.pg2.enabled=${PG2_ENABLED:false}
app.datasource.pg2.url=${PG2_URL:}
app.datasource.pg2.username=${PG2_USERNAME:}
app.datasource.pg2.password=${PG2_PASSWORD:}
app.datasource.pg2.hikari.maximum-pool-size=${PG2_HIKARI_MAX_POOL:2}
app.datasource.pg2.hikari.minimum-idle=${PG2_HIKARI_MIN_IDLE:1}
app.datasource.pg2.hikari.connection-timeout=30000
app.datasource.pg2.hikari.initialization-fail-timeout=-1

# PostgreSQL 3 (Purple â€” active)
app.datasource.pg3.enabled=${PG3_ENABLED:false}
app.datasource.pg3.url=${PG3_URL:}
app.datasource.pg3.username=${PG3_USERNAME:}
app.datasource.pg3.password=${PG3_PASSWORD:}
app.datasource.pg3.hikari.maximum-pool-size=${PG3_HIKARI_MAX_POOL:20}
app.datasource.pg3.hikari.minimum-idle=${PG3_HIKARI_MIN_IDLE:1}
app.datasource.pg3.hikari.connection-timeout=${PG_CONN_TIMEOUT:8000}
app.datasource.pg3.hikari.initialization-fail-timeout=-1

# PostgreSQL 4 (Amber â€” active)
app.datasource.pg4.enabled=${PG4_ENABLED:false}
app.datasource.pg4.url=${PG4_URL:}
app.datasource.pg4.username=${PG4_USERNAME:}
app.datasource.pg4.password=${PG4_PASSWORD:}
app.datasource.pg4.hikari.maximum-pool-size=${PG4_HIKARI_MAX_POOL:20}
app.datasource.pg4.hikari.minimum-idle=${PG4_HIKARI_MIN_IDLE:1}
app.datasource.pg4.hikari.connection-timeout=${PG_CONN_TIMEOUT:8000}
app.datasource.pg4.hikari.initialization-fail-timeout=-1

# PostgreSQL 5 (Olive â€” active)
app.datasource.pg5.enabled=${PG5_ENABLED:false}
app.datasource.pg5.url=${PG5_URL:}
app.datasource.pg5.username=${PG5_USERNAME:}
app.datasource.pg5.password=${PG5_PASSWORD:}
app.datasource.pg5.hikari.maximum-pool-size=${PG5_HIKARI_MAX_POOL:20}
app.datasource.pg5.hikari.minimum-idle=${PG5_HIKARI_MIN_IDLE:1}
app.datasource.pg5.hikari.connection-timeout=${PG_CONN_TIMEOUT:8000}
app.datasource.pg5.hikari.initialization-fail-timeout=-1

# DB Storage Capacity (bytes)
app.storage.pg-max-bytes=${PG_MAX_BYTES:3298534883328}
app.storage.pg2-max-bytes=${PG2_MAX_BYTES:3298534883328}
app.storage.pg3-max-bytes=${PG3_MAX_BYTES:3298534883328}
app.storage.pg4-max-bytes=${PG4_MAX_BYTES:3298534883328}
app.storage.pg5-max-bytes=${PG5_MAX_BYTES:3298534883328}

# Load Test Config
loadtest.threads=${LOADTEST_THREADS:20}
loadtest.chunk-size-mb=${LOADTEST_CHUNK_MB:10}
loadtest.video-path=${LOADTEST_VIDEO_PATH:./data/video.mp4}
loadtest.hashing-rounds=${LOADTEST_HASH_ROUNDS:5}
loadtest.matrix-size=${LOADTEST_MATRIX_SIZE:200}
loadtest.memory-pressure-mb=${LOADTEST_MEMORY_MB:500}
loadtest.auto-start=${LOADTEST_AUTO_START:false}
loadtest.generate-if-missing=${LOADTEST_GENERATE:false}
loadtest.generate-size-mb=${LOADTEST_GENERATE_SIZE_MB:100}
